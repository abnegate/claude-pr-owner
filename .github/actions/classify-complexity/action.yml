name: Classify task complexity with Haiku
description: >
  Ask Claude Haiku to classify a task as 'simple' or 'complex' and pick a model
  pair (primary + fallback). Favours opus — sonnet is only chosen when Haiku
  explicitly says 'simple'; any other output routes to opus.

inputs:
  oauth_token:
    description: Claude Code OAuth token. Provide this OR api_key.
    required: false
    default: ""
  api_key:
    description: Anthropic API key. Provide this OR oauth_token.
    required: false
    default: ""
  prompt:
    description: >
      Full classification prompt. Must instruct Haiku to reply with EXACTLY
      one lowercase word — 'simple' or 'complex' — and nothing else.
    required: true

outputs:
  model:
    description: Selected primary model.
    value: ${{ steps.select.outputs.model }}
  fallback:
    description: Fallback model.
    value: ${{ steps.select.outputs.fallback }}
  classification:
    description: Raw classification string ('simple', 'complex', or empty on failure).
    value: ${{ steps.select.outputs.classification }}

runs:
  using: composite
  steps:
    - name: Validate auth
      shell: bash
      env:
        CLAUDE_CODE_OAUTH_TOKEN: ${{ inputs.oauth_token }}
        ANTHROPIC_API_KEY: ${{ inputs.api_key }}
      run: |
        if [[ -z "$CLAUDE_CODE_OAUTH_TOKEN" && -z "$ANTHROPIC_API_KEY" ]]; then
          echo "::error::classify-complexity needs either oauth_token or api_key."
          exit 1
        fi

    # The base action uses @anthropic-ai/claude-agent-sdk, which reads
    # CLAUDE_CODE_OAUTH_TOKEN correctly. The native `claude` CLI installed by
    # install.sh does not, and silently fails with "Not logged in · Please run
    # /login" when only the env token is supplied. Delegating here avoids
    # re-implementing the SDK's auth bootstrap.
    #
    # Pinned to the `base-action/` subdir of claude-code-action at the same
    # SHA the orchestrator uses for the main run (v1.0.104). The standalone
    # `anthropics/claude-code-base-action` mirror repo lags far behind (still
    # on CC 1.0.88 at v0.0.63 while this SHA ships CC 2.1.118) so we read the
    # in-tree copy instead to keep classify and improvement on the same CC.
    - name: Classify via claude-code-base-action
      id: classify
      uses: anthropics/claude-code-action/base-action@b4d67413279fc18c6e5de930ae307c4f108714eb # v1.0.104
      continue-on-error: true
      with:
        claude_code_oauth_token: ${{ inputs.oauth_token }}
        anthropic_api_key: ${{ inputs.api_key }}
        prompt: ${{ inputs.prompt }}
        claude_args: |
          --model claude-haiku-4-5
          --max-turns 1
          --dangerously-skip-permissions
          --json-schema {"type":"object","properties":{"classification":{"type":"string","enum":["simple","complex"]}},"required":["classification"],"additionalProperties":false}

    - name: Select model
      id: select
      shell: bash
      env:
        STRUCTURED_OUTPUT: ${{ steps.classify.outputs.structured_output }}
      run: |
        classification=$(printf '%s' "$STRUCTURED_OUTPUT" | jq -r '.classification // empty' 2>/dev/null)
        echo "Haiku classification: '$classification'"

        # Favour opus; sonnet only when haiku explicitly says simple.
        if [[ "$classification" == "simple" ]]; then
          model="claude-sonnet-4-6"
          fallback="claude-opus-4-7"
        else
          model="claude-opus-4-7"
          fallback="claude-sonnet-4-6"
        fi

        {
          echo "classification=$classification"
          echo "model=$model"
          echo "fallback=$fallback"
        } >> "$GITHUB_OUTPUT"
        echo "Selected primary=$model, fallback=$fallback"
